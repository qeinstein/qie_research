run:
  name: high_rank_noise
  seed: 42
  output_dir: results/metrics/

dataset:
  name: high_rank_noise
  test_size: 0.2
  n_samples: 5000
  n_features: 200
  n_signal_components: 5
  noise_std: 1.0
  seed: 42

encodings:
  - name: amplitude
    pad_to_power_of_two: true

  - name: angle
    scale: 3.141592653589793
    standardize: true

  - name: basis
    n_bits: 8

model:
  name: logistic_regression
  max_iter: 1000
  C: 1.0
