run:
  name: high_dim_parity
  seed: 42
  output_dir: results/metrics/
  torch:
    epochs: 100
    lr: 0.001
    weight_decay: 0.0001
    batch_size: 256

dataset:
  name: high_dim_parity
  test_size: 0.2
  n_samples: 10000
  n_features: 20
  n_parity_bits: 5
  seed: 42

encodings:
  - name: amplitude
    pad_to_power_of_two: true

  - name: angle
    scale: 3.141592653589793
    standardize: true

  - name: basis
    n_bits: 8

model:
  name: logistic_regression
  max_iter: 1000
  C: 1.0

baselines:
  - name: raw_linear
    feature_map: {name: scaler}
    model: {name: logistic_regression, max_iter: 1000, C: 1.0}

  - name: rff
    feature_map: {name: rff, n_components: auto, gamma: auto}
    model: {name: logistic_regression, max_iter: 1000, C: 1.0}

  - name: poly2
    feature_map: {name: polynomial, degree: 2}
    model: {name: logistic_regression, max_iter: 1000, C: 1.0}

  - name: poly3
    feature_map: {name: polynomial, degree: 3}
    model: {name: logistic_regression, max_iter: 2000, C: 1.0}

  - name: pca
    feature_map: {name: pca, n_components: auto}
    model: {name: logistic_regression, max_iter: 1000, C: 1.0}

  - name: rbf_svm
    model: {name: rbf_svm, C: 1.0, gamma: scale}

  - name: mlp
    model: {name: mlp, hidden_layer_sizes: [256, 128], max_iter: 500, alpha: 0.0001}

  - name: torch_mlp
    model: {name: torch_mlp, hidden_layer_sizes: [256, 128], epochs: 100, lr: 0.001, weight_decay: 0.0001, batch_size: 256}
