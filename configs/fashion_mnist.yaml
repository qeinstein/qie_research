run:
  name: fashion_mnist
  seed: 42
  output_dir: results/metrics/
  torch:
    epochs: 100
    lr: 0.001
    weight_decay: 0.0001
    batch_size: 256

dataset:
  name: fashion_mnist
  test_size: 0.2
  data_home: data/raw/
  # max_samples: 10000  # uncomment for faster dev runs

encodings:
  - name: amplitude
    pad_to_power_of_two: true

  - name: angle
    scale: 3.141592653589793
    standardize: true

  - name: basis
    n_bits: 8

model:
  name: logistic_regression
  max_iter: 1000
  C: 1.0

# Polynomial features omitted: 784 features → ~307k degree-2 features (intractable).
# PCA and RFF use explicit n_components=256 (reasonable for image data; auto would
# match QIE d_out which is 4k+ for amplitude on 784 features).
# SVM capped at 10k training rows.
baselines:
  - name: raw_linear
    feature_map: {name: scaler}
    model: {name: logistic_regression, max_iter: 1000, C: 1.0}

  - name: rff
    feature_map: {name: rff, n_components: 256, gamma: auto}
    model: {name: logistic_regression, max_iter: 1000, C: 1.0}

  - name: pca
    feature_map: {name: pca, n_components: 256}
    model: {name: logistic_regression, max_iter: 1000, C: 1.0}

  - name: rbf_svm
    max_samples: 10000
    model: {name: rbf_svm, C: 1.0, gamma: scale}

  - name: mlp
    model: {name: mlp, hidden_layer_sizes: [256, 128], max_iter: 500, alpha: 0.0001}

  - name: torch_mlp
    model: {name: torch_mlp, hidden_layer_sizes: [256, 128], epochs: 100, lr: 0.001, weight_decay: 0.0001, batch_size: 256}
