run:
  name: covertype
  seed: 42
  output_dir: results/metrics/

dataset:
  name: covertype
  test_size: 0.2
  # max_samples: 50000  # uncomment for faster dev runs

encodings:
  - name: amplitude
    pad_to_power_of_two: true

  - name: angle
    scale: 3.141592653589793
    standardize: true

  - name: basis
    n_bits: 8

model:
  name: logistic_regression
  max_iter: 1000
  C: 1.0

# SVM capped at 20k rows. Poly3 omitted (intractable on 581k rows).
baselines:
  - name: raw_linear
    feature_map: {name: scaler}
    model: {name: logistic_regression, max_iter: 1000, C: 1.0}

  - name: rff
    feature_map: {name: rff, n_components: auto, gamma: auto}
    model: {name: logistic_regression, max_iter: 1000, C: 1.0}

  - name: poly2
    feature_map: {name: polynomial, degree: 2}
    model: {name: logistic_regression, max_iter: 1000, C: 1.0}

  - name: pca
    feature_map: {name: pca, n_components: auto}
    model: {name: logistic_regression, max_iter: 1000, C: 1.0}

  - name: rbf_svm
    max_samples: 20000
    model: {name: rbf_svm, C: 1.0, gamma: scale}

  - name: mlp
    model: {name: mlp, hidden_layer_sizes: [256, 128], max_iter: 500, alpha: 0.0001}
