name: Experiment run
description: Register a benchmark run, sweep, ablation, or rerun.
title: "[EXP][dataset][method] "
labels:
  - "type:experiment-run"
body:
  - type: input
    id: dataset
    attributes:
      label: Dataset
      placeholder: fashion-mnist, breast-cancer, synthetic-high-rank-noise, etc.
    validations:
      required: true
  - type: input
    id: method
    attributes:
      label: Method
      placeholder: amplitude, angle, basis, rbf, polynomial, rff, autoencoder
    validations:
      required: true
  - type: input
    id: budget
    attributes:
      label: Matched representational budget
      placeholder: Output dimension, parameter cap, or comparable budget definition
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config and seed plan
      description: Record config paths, fixed seeds, and sweep definitions.
      placeholder: "- configs/...yaml\n- seeds: 0,1,2,3,4"
    validations:
      required: true
  - type: textarea
    id: outputs
    attributes:
      label: Expected outputs
      description: List the tables, metrics, logs, or figures this run should produce.
      placeholder: "- results/metrics/...\n- results/ntk/...\n- results/logs/profiling/..."
    validations:
      required: true
  - type: textarea
    id: overhead
    attributes:
      label: Overhead accounting plan
      description: Explain how encoding wall-clock, memory, and runtime overhead will be tracked.
      placeholder: Include profiling logs, timing hooks, and any stop condition if encoding dominates training cost.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Registration checklist
      options:
        - label: The comparison uses a matched architecture or feature budget.
          required: true
        - label: The run records predictive metrics and non-accuracy diagnostics where relevant.
          required: true
        - label: The run tracks NTK or representational diagnostics when this is a primary comparison.
          required: false

